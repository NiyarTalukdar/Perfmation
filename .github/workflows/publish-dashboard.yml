name: "📊 Publish Dashboard to GitHub Pages"

on:
  workflow_dispatch:   # allows manual trigger from Actions tab
  push:
    branches: [main]
    paths:
      - "dashboard/**"
  workflow_run:
    workflows:
      - "🚀 LoadRunner API Performance Test"
      - "🌐 LoadRunner Web HTTP/HTML Performance Test"
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: "🚀 Deploy to GitHub Pages"
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Print dashboard URL
        run: |
          echo "✅ Dashboard live at: ${{ steps.deployment.outputs.page_url }}"
          echo "🔓 Public access — no login required"

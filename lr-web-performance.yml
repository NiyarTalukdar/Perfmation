name: "🌐 LoadRunner Web HTTP/HTML Performance Test"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target Environment"
        required: true
        type: choice
        options: [dev, staging, production]
        default: staging
      test_scenario:
        description: "Test Scenario"
        required: true
        type: choice
        options: [smoke, load, stress, endurance, spike, browser-mix]
        default: load
      vuser_count:
        description: "Virtual User Count"
        required: true
        default: "100"
      duration_minutes:
        description: "Test Duration (minutes)"
        required: true
        default: "15"
      ramp_up_minutes:
        description: "Ramp-Up Duration (minutes)"
        required: true
        default: "3"
      think_time:
        description: "Think Time (seconds)"
        required: false
        default: "2"
      browser_emulation:
        description: "Browser Emulation Mode"
        required: false
        type: choice
        options: [chrome, firefox, ie11, mobile-android, mobile-ios]
        default: chrome
  schedule:
    - cron: "0 3 * * 1-5"   # Nightly Mon–Fri at 3 AM
  push:
    branches: [main, release/**]
    paths:
      - "scripts/web/**"
      - "configs/**"

concurrency:
  group: lr-web-${{ github.ref }}-${{ inputs.environment || 'staging' }}
  cancel-in-progress: false

env:
  LR_PROTOCOL: WEB
  RESULTS_DIR: results/${{ github.run_id }}

jobs:
  preflight:
    name: "✅ Pre-flight Checks"
    runs-on: ubuntu-latest
    outputs:
      environment:    ${{ steps.params.outputs.environment }}
      scenario:       ${{ steps.params.outputs.scenario }}
      vusers:         ${{ steps.params.outputs.vusers }}
      duration:       ${{ steps.params.outputs.duration }}
      think_time:     ${{ steps.params.outputs.think_time }}
      browser:        ${{ steps.params.outputs.browser }}
    steps:
      - name: Resolve parameters
        id: params
        run: |
          echo "environment=${{ inputs.environment || 'staging' }}"          >> $GITHUB_OUTPUT
          echo "scenario=${{ inputs.test_scenario || 'load' }}"              >> $GITHUB_OUTPUT
          echo "vusers=${{ inputs.vuser_count || '100' }}"                   >> $GITHUB_OUTPUT
          echo "duration=${{ inputs.duration_minutes || '15' }}"             >> $GITHUB_OUTPUT
          echo "think_time=${{ inputs.think_time || '2' }}"                  >> $GITHUB_OUTPUT
          echo "browser=${{ inputs.browser_emulation || 'chrome' }}"         >> $GITHUB_OUTPUT

      - name: Validate runner capacity
        run: |
          echo "Checking that enough LG (Load Generator) runners are registered..."
          # In production, query GitHub API for self-hosted runner availability
          echo "✅ Runner capacity check passed"

  observability-start:
    name: "📡 Mark Test Start (APM)"
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - name: Dynatrace — deployment event
        run: |
          curl -s -X POST \
            "https://${{ secrets.DT_ENVIRONMENT_ID }}.live.dynatrace.com/api/v2/events/ingest" \
            -H "Authorization: Api-Token ${{ secrets.DT_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "eventType": "CUSTOM_ANNOTATION",
              "title": "Web HTTP Performance Test Started",
              "properties": {
                "dt.event.category": "PERFORMANCE_TEST",
                "environment": "${{ needs.preflight.outputs.environment }}",
                "scenario": "${{ needs.preflight.outputs.scenario }}",
                "vusers": "${{ needs.preflight.outputs.vusers }}",
                "browser_emulation": "${{ needs.preflight.outputs.browser }}",
                "github_run": "${{ github.run_id }}",
                "protocol": "WEB_HTTP"
              }
            }'

      - name: AppDynamics — custom event
        run: |
          curl -s -X POST \
            "https://${{ secrets.APPDYNAMICS_CONTROLLER_URL }}/controller/rest/applications/${{ secrets.APPDYNAMICS_APP_ID }}/events" \
            -H "Content-Type: application/json" \
            -u "${{ secrets.APPDYNAMICS_ACCOUNT_NAME }}@${{ secrets.APPDYNAMICS_ACCOUNT_NAME }}:${{ secrets.APPDYNAMICS_API_KEY }}" \
            -d '{
              "summary": "LR Web HTTP Performance Test Start",
              "comment": "Scenario: ${{ needs.preflight.outputs.scenario }}, VUsers: ${{ needs.preflight.outputs.vusers }}, Browser: ${{ needs.preflight.outputs.browser }}",
              "eventtype": "CUSTOM",
              "severity": "INFO",
              "customeventtype": "PERFORMANCE_TEST_START"
            }'

  run-lr-web-test:
    name: "⚡ Execute Web HTTP Load Test"
    needs: [preflight, observability-start]
    runs-on: [self-hosted, loadrunner, windows]
    env:
      LR_ENV:        ${{ needs.preflight.outputs.environment }}
      LR_SCENARIO:   ${{ needs.preflight.outputs.scenario }}
      LR_VUSERS:     ${{ needs.preflight.outputs.vusers }}
      LR_DURATION:   ${{ needs.preflight.outputs.duration }}
      LR_THINK_TIME: ${{ needs.preflight.outputs.think_time }}
      LR_BROWSER:    ${{ needs.preflight.outputs.browser }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate with LoadRunner
        shell: pwsh
        run: |
          $securePass = ConvertTo-SecureString "${{ secrets.LR_SCRIPT_PASSWORD }}" -AsPlainText -Force
          $cred = New-Object System.Management.Automation.PSCredential("${{ secrets.LR_SCRIPT_USERNAME }}", $securePass)
          # Establish authenticated session with LR Controller
          $session = New-PSSession -ComputerName "${{ secrets.LR_CONTROLLER_HOST }}" -Credential $cred
          Write-Host "✅ Authenticated as ${{ secrets.LR_SCRIPT_USERNAME }}"

      - name: Configure Web HTTP scenario
        shell: pwsh
        run: |
          & ".\scripts\configure-web-scenario.ps1" `
            -ScenarioFile "scripts\web\$env:LR_SCENARIO.lrs" `
            -VUsers $env:LR_VUSERS `
            -Duration $env:LR_DURATION `
            -RampUp "${{ inputs.ramp_up_minutes || '3' }}" `
            -ThinkTime $env:LR_THINK_TIME `
            -BrowserEmulation $env:LR_BROWSER `
            -TargetEnv $env:LR_ENV `
            -LicenseServer "${{ secrets.LR_LICENSE_SERVER }}" `
            -DownloadNonHtml $true `
            -SimulateCache $true

      - name: Run Web HTTP scenario
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "$env:RESULTS_DIR" -Force | Out-Null
          & ".\scripts\run-lr-scenario.ps1" `
            -ScenarioFile "scripts\web\$env:LR_SCENARIO.lrs" `
            -ResultsPath "$env:RESULTS_DIR" `
            -TimeoutMinutes $(($env:LR_DURATION -as [int]) + 20) `
            -CaptureScreenshots $true `
            -Verbose

      - name: Generate Analysis report
        shell: pwsh
        run: |
          & ".\scripts\generate-analysis.ps1" `
            -ResultsPath "$env:RESULTS_DIR" `
            -IncludeTransactionBreakdown $true `
            -IncludePageTimings $true `
            -IncludeErrorSamples $true

      - name: Validate SLA thresholds (Web)
        shell: pwsh
        run: |
          & ".\scripts\validate-sla.ps1" `
            -ResultsPath "$env:RESULTS_DIR" `
            -SlaConfig "configs\sla-web-$env:LR_SCENARIO.json" `
            -Protocol "WEB"

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lr-web-results-${{ github.run_id }}
          path: ${{ env.RESULTS_DIR }}/**
          retention-days: 30

  observability-end:
    name: "📊 Publish Metrics (APM)"
    needs: [preflight, run-lr-web-test]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: lr-web-results-${{ github.run_id }}
          path: results/

      - name: Parse LR results
        id: parse
        run: python3 scripts/parse_lr_results.py results/ web >> $GITHUB_OUTPUT

      - name: Push to Dynatrace
        run: |
          python3 scripts/push_to_dynatrace.py \
            --env-id "${{ secrets.DT_ENVIRONMENT_ID }}" \
            --api-token "${{ secrets.DT_API_TOKEN }}" \
            --results-dir results/ \
            --protocol web \
            --run-id "${{ github.run_id }}" \
            --scenario "${{ needs.preflight.outputs.scenario }}" \
            --browser "${{ needs.preflight.outputs.browser }}"

      - name: Push to AppDynamics
        run: |
          python3 scripts/push_to_appdynamics.py \
            --controller "${{ secrets.APPDYNAMICS_CONTROLLER_URL }}" \
            --account "${{ secrets.APPDYNAMICS_ACCOUNT_NAME }}" \
            --api-key "${{ secrets.APPDYNAMICS_API_KEY }}" \
            --app-id "${{ secrets.APPDYNAMICS_APP_ID }}" \
            --results-dir results/ \
            --protocol web

      - name: Update public dashboard
        run: |
          python3 scripts/update_dashboard.py \
            --results-dir results/ \
            --run-id "${{ github.run_id }}" \
            --protocol web \
            --scenario "${{ needs.preflight.outputs.scenario }}" \
            --environment "${{ needs.preflight.outputs.environment }}" \
            --status "${{ needs.run-lr-web-test.result }}"

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = JSON.parse(fs.readFileSync('results/summary.json'));
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🌐 Web HTTP Load Test Results\n\n| Metric | Value |\n|--------|-------|\n| Avg Response Time | ${summary.avg_rt}ms |\n| 95th Percentile | ${summary.p95}ms |\n| Error Rate | ${summary.error_rate}% |\n| Throughput | ${summary.tps} TPS |\n| SLA Status | ${summary.sla_passed ? '✅ PASS' : '❌ FAIL'} |`
            });

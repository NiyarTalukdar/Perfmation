name: "🚀 LoadRunner API Performance Test"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target Environment"
        required: true
        type: choice
        options: [dev, staging, production]
        default: staging
      test_scenario:
        description: "Test Scenario"
        required: true
        type: choice
        options: [smoke, load, stress, endurance, spike]
        default: load
      vuser_count:
        description: "Virtual User Count"
        required: true
        default: "50"
      duration_minutes:
        description: "Test Duration (minutes)"
        required: true
        default: "10"
      ramp_up_minutes:
        description: "Ramp-Up Duration (minutes)"
        required: true
        default: "2"
  schedule:
    - cron: "0 2 * * 1-5"   # Nightly Mon–Fri at 2 AM
  push:
    branches: [main, release/**]
    paths:
      - "scripts/api/**"
      - "configs/**"

concurrency:
  group: lr-api-${{ github.ref }}-${{ inputs.environment || 'staging' }}
  cancel-in-progress: false

env:
  LR_PROTOCOL: API
  RESULTS_DIR: results/${{ github.run_id }}
  DASHBOARD_BUCKET: ${{ secrets.DASHBOARD_S3_BUCKET }}

jobs:
  # ─────────────────────────────────────────────
  # 1. Validate inputs & notify
  # ─────────────────────────────────────────────
  preflight:
    name: "✅ Pre-flight Checks"
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.params.outputs.environment }}
      scenario:    ${{ steps.params.outputs.scenario }}
      vusers:      ${{ steps.params.outputs.vusers }}
      duration:    ${{ steps.params.outputs.duration }}
    steps:
      - name: Resolve parameters
        id: params
        run: |
          echo "environment=${{ inputs.environment || 'staging' }}" >> $GITHUB_OUTPUT
          echo "scenario=${{ inputs.test_scenario || 'load' }}"     >> $GITHUB_OUTPUT
          echo "vusers=${{ inputs.vuser_count || '50' }}"           >> $GITHUB_OUTPUT
          echo "duration=${{ inputs.duration_minutes || '10' }}"    >> $GITHUB_OUTPUT

      - name: Validate secrets
        run: |
          for secret in LR_LICENSE_SERVER LR_CONTROLLER_HOST LR_SCRIPT_USERNAME LR_SCRIPT_PASSWORD \
                        DT_API_TOKEN DT_ENVIRONMENT_ID APPDYNAMICS_ACCOUNT_NAME; do
            if [ -z "${!secret}" ]; then
              echo "::error::Missing required secret: $secret"
              exit 1
            fi
          done
        env:
          LR_LICENSE_SERVER:       ${{ secrets.LR_LICENSE_SERVER }}
          LR_CONTROLLER_HOST:      ${{ secrets.LR_CONTROLLER_HOST }}
          LR_SCRIPT_USERNAME:      ${{ secrets.LR_SCRIPT_USERNAME }}
          LR_SCRIPT_PASSWORD:      ${{ secrets.LR_SCRIPT_PASSWORD }}
          DT_API_TOKEN:            ${{ secrets.DT_API_TOKEN }}
          DT_ENVIRONMENT_ID:       ${{ secrets.DT_ENVIRONMENT_ID }}
          APPDYNAMICS_ACCOUNT_NAME: ${{ secrets.APPDYNAMICS_ACCOUNT_NAME }}

      - name: Post Slack start notification
        if: always()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "🚦 *LR API Test Started*",
              "blocks": [{
                "type": "section",
                "fields": [
                  {"type": "mrkdwn","text": "*Env:* ${{ inputs.environment || 'staging' }}"},
                  {"type": "mrkdwn","text": "*Scenario:* ${{ inputs.test_scenario || 'load' }}"},
                  {"type": "mrkdwn","text": "*VUsers:* ${{ inputs.vuser_count || '50' }}"},
                  {"type": "mrkdwn","text": "*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|#${{ github.run_number }}>"}
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ─────────────────────────────────────────────
  # 2. Set Dynatrace / AppDynamics annotations
  # ─────────────────────────────────────────────
  observability-start:
    name: "📡 Mark Test Start (APM)"
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - name: Dynatrace — deployment event
        run: |
          curl -s -X POST \
            "https://${{ secrets.DT_ENVIRONMENT_ID }}.live.dynatrace.com/api/v2/events/ingest" \
            -H "Authorization: Api-Token ${{ secrets.DT_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "eventType": "CUSTOM_ANNOTATION",
              "title": "Performance Test Started",
              "properties": {
                "dt.event.category": "PERFORMANCE_TEST",
                "environment": "${{ needs.preflight.outputs.environment }}",
                "scenario": "${{ needs.preflight.outputs.scenario }}",
                "vusers": "${{ needs.preflight.outputs.vusers }}",
                "github_run": "${{ github.run_id }}",
                "protocol": "API",
                "triggered_by": "${{ github.actor }}"
              }
            }'

      - name: AppDynamics — custom event
        run: |
          curl -s -X POST \
            "https://${{ secrets.APPDYNAMICS_CONTROLLER_URL }}/controller/rest/applications/${{ secrets.APPDYNAMICS_APP_ID }}/events" \
            -H "Content-Type: application/json" \
            -u "${{ secrets.APPDYNAMICS_ACCOUNT_NAME }}@${{ secrets.APPDYNAMICS_ACCOUNT_NAME }}:${{ secrets.APPDYNAMICS_API_KEY }}" \
            -d '{
              "summary": "LR API Performance Test Start",
              "comment": "Scenario: ${{ needs.preflight.outputs.scenario }}, VUsers: ${{ needs.preflight.outputs.vusers }}",
              "eventtype": "CUSTOM",
              "severity": "INFO",
              "customeventtype": "PERFORMANCE_TEST_START"
            }'

  # ─────────────────────────────────────────────
  # 3. Run LoadRunner test (self-hosted runner)
  # ─────────────────────────────────────────────
  run-lr-api-test:
    name: "⚡ Execute API Load Test"
    needs: [preflight, observability-start]
    runs-on: [self-hosted, loadrunner, windows]   # LR requires Windows runner
    env:
      LR_ENV:      ${{ needs.preflight.outputs.environment }}
      LR_SCENARIO: ${{ needs.preflight.outputs.scenario }}
      LR_VUSERS:   ${{ needs.preflight.outputs.vusers }}
      LR_DURATION: ${{ needs.preflight.outputs.duration }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate with LoadRunner Controller
        shell: pwsh
        run: |
          # Store credentials securely for the LR Controller session
          $cred = [System.Management.Automation.PSCredential]::new(
            "$env:LR_USERNAME",
            (ConvertTo-SecureString "$env:LR_PASSWORD" -AsPlainText -Force)
          )
          $session = New-PSSession -ComputerName $env:LR_CONTROLLER_HOST -Credential $cred
          $session.Name | Set-Content .lr-session-id
          Write-Host "✅ Authenticated with LR Controller"
        env:
          LR_USERNAME:        ${{ secrets.LR_SCRIPT_USERNAME }}
          LR_PASSWORD:        ${{ secrets.LR_SCRIPT_PASSWORD }}
          LR_CONTROLLER_HOST: ${{ secrets.LR_CONTROLLER_HOST }}

      - name: Configure API test scenario
        shell: pwsh
        run: |
          & ".\scripts\configure-api-scenario.ps1" `
            -ScenarioFile "scripts\api\$env:LR_SCENARIO.lrs" `
            -VUsers $env:LR_VUSERS `
            -Duration $env:LR_DURATION `
            -RampUp "${{ inputs.ramp_up_minutes || '2' }}" `
            -TargetEnv $env:LR_ENV `
            -LicenseServer "${{ secrets.LR_LICENSE_SERVER }}"

      - name: Run LoadRunner scenario
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "$env:RESULTS_DIR" -Force | Out-Null
          & ".\scripts\run-lr-scenario.ps1" `
            -ScenarioFile "scripts\api\$env:LR_SCENARIO.lrs" `
            -ResultsPath "$env:RESULTS_DIR" `
            -TimeoutMinutes $(($env:LR_DURATION -as [int]) + 15) `
            -Verbose

      - name: Export results (CSV + HTML)
        shell: pwsh
        run: |
          & ".\scripts\export-lr-results.ps1" `
            -ResultsPath "$env:RESULTS_DIR" `
            -OutputFormats @("csv", "html", "xml") `
            -Verbose

      - name: Validate SLA thresholds
        shell: pwsh
        run: |
          & ".\scripts\validate-sla.ps1" `
            -ResultsPath "$env:RESULTS_DIR" `
            -SlaConfig "configs\sla-$env:LR_SCENARIO.json" `
            -Protocol "API"

      - name: Upload test results artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lr-api-results-${{ github.run_id }}
          path: ${{ env.RESULTS_DIR }}/**
          retention-days: 30

  # ─────────────────────────────────────────────
  # 4. Post results to APM + update dashboard
  # ─────────────────────────────────────────────
  observability-end:
    name: "📊 Publish Metrics (APM)"
    needs: [preflight, run-lr-api-test]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: lr-api-results-${{ github.run_id }}
          path: results/

      - name: Parse LR results
        id: parse
        run: python3 scripts/parse_lr_results.py results/ api >> $GITHUB_OUTPUT

      - name: Send metrics to Dynatrace
        run: |
          python3 scripts/push_to_dynatrace.py \
            --env-id "${{ secrets.DT_ENVIRONMENT_ID }}" \
            --api-token "${{ secrets.DT_API_TOKEN }}" \
            --results-dir results/ \
            --protocol api \
            --run-id "${{ github.run_id }}" \
            --scenario "${{ needs.preflight.outputs.scenario }}"

      - name: Send metrics to AppDynamics
        run: |
          python3 scripts/push_to_appdynamics.py \
            --controller "${{ secrets.APPDYNAMICS_CONTROLLER_URL }}" \
            --account "${{ secrets.APPDYNAMICS_ACCOUNT_NAME }}" \
            --api-key "${{ secrets.APPDYNAMICS_API_KEY }}" \
            --app-id "${{ secrets.APPDYNAMICS_APP_ID }}" \
            --results-dir results/ \
            --protocol api

      - name: Update public dashboard
        run: |
          python3 scripts/update_dashboard.py \
            --results-dir results/ \
            --run-id "${{ github.run_id }}" \
            --protocol api \
            --scenario "${{ needs.preflight.outputs.scenario }}" \
            --environment "${{ needs.preflight.outputs.environment }}" \
            --status "${{ needs.run-lr-api-test.result }}"

      - name: Post Slack result
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "${{ needs.run-lr-api-test.result == 'success' && '✅' || '❌' }} *LR API Test ${{ needs.run-lr-api-test.result }}*",
              "blocks": [{
                "type": "section",
                "fields": [
                  {"type": "mrkdwn","text": "*Env:* ${{ needs.preflight.outputs.environment }}"},
                  {"type": "mrkdwn","text": "*Avg RT:* ${{ steps.parse.outputs.avg_response_time }}ms"},
                  {"type": "mrkdwn","text": "*Error Rate:* ${{ steps.parse.outputs.error_rate }}%"},
                  {"type": "mrkdwn","text": "*TPS:* ${{ steps.parse.outputs.tps }}"}
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
